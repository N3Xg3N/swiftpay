spring:
  artemis:
    mode: embedded
    embedded:
      enabled: true
      persistent: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  jms:
    template:
      receive-timeout: 2000   # 2s timeout so receiveAndConvert doesn't block indefinitely

logging:
  level:
    com.fx.payment: DEBUG
